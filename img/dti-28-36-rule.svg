<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" width="1000" height="1500" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif"><defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect width="1000" height="1500" fill="#ffffff"/><rect width="1000" height="240" fill="url(#hg)"/><text x="50" y="100" fill="#ffffff" font-size="54" font-weight="800">The 28/36 Rule</text><text x="50" y="152" fill="#e9e7fb" font-size="25" font-weight="600">How much can you borrow?</text><text x="50" y="208" fill="#ffffff" font-size="23" font-weight="700" opacity="0.95">What lenders use to size your loan</text><rect x="50" y="300" width="430" height="300" rx="18" fill="#eef0ff"/><text x="265" y="430" text-anchor="middle" fill="#4f46e5" font-size="92" font-weight="800">28%</text><text x="265" y="490" text-anchor="middle" fill="#1f2937" font-size="24" font-weight="700">Front-end ratio</text><text x="265" y="528" text-anchor="middle" fill="#6b7280" font-size="20">Housing payment</text><text x="265" y="556" text-anchor="middle" fill="#6b7280" font-size="20">÷ gross income</text><rect x="520" y="300" width="430" height="300" rx="18" fill="#e8f5ee"/><text x="735" y="430" text-anchor="middle" fill="#16a34a" font-size="92" font-weight="800">36%</text><text x="735" y="490" text-anchor="middle" fill="#1f2937" font-size="24" font-weight="700">Back-end ratio</text><text x="735" y="528" text-anchor="middle" fill="#6b7280" font-size="20">ALL debt payments</text><text x="735" y="556" text-anchor="middle" fill="#6b7280" font-size="20">÷ gross income</text><text x="50" y="700" fill="#1f2937" font-size="28" font-weight="800">Front-end (28%)</text><text x="50" y="742" fill="#6b7280" font-size="24">Mortgage/rent + property tax + insurance + HOA</text><text x="50" y="820" fill="#1f2937" font-size="28" font-weight="800">Back-end (36%)</text><text x="50" y="862" fill="#6b7280" font-size="24">Housing + car loans + student loans + credit cards</text><text x="50" y="970" fill="#6b7280" font-size="24">Lower ratios = better interest rates and easier approval.</text><rect x="50" y="1300" width="900" height="92" rx="14" fill="#eef0ff"/><rect x="50" y="1300" width="6" height="92" rx="3" fill="#4f46e5"/><text x="78" y="1338" fill="#4f46e5" font-size="22" font-weight="800">EXAMPLE</text><text x="78" y="1372" fill="#1f2937" font-size="24" font-weight="600">$6,000/mo gross  →  housing ≤ $1,680  ·  total debt ≤ $2,160</text><rect y="1460" width="1000" height="40" fill="#f3f4f6"/><text x="50" y="1487" fill="#4f46e5" font-size="24" font-weight="800">usecalcfi.com</text><text x="950" y="1487" text-anchor="end" fill="#6b7280" font-size="20">Free to share with credit</text></svg>