<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" width="1000" height="1500" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif"><defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect width="1000" height="1500" fill="#ffffff"/><rect width="1000" height="240" fill="url(#hg)"/><text x="50" y="100" fill="#ffffff" font-size="54" font-weight="800">The 50/30/20 Rule</text><text x="50" y="152" fill="#e9e7fb" font-size="25" font-weight="600">A simple budget that actually works</text><text x="50" y="208" fill="#ffffff" font-size="23" font-weight="700" opacity="0.95">Split your after-tax income into 3 buckets</text><rect x="50" y="300" width="450" height="110" fill="#4f46e5"/><rect x="500" y="300" width="270" height="110" fill="#a5b4fc"/><rect x="770" y="300" width="180" height="110" fill="#16a34a"/><text x="275" y="358" text-anchor="middle" fill="#fff" font-size="44" font-weight="800">50%</text><text x="275" y="390" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">NEEDS</text><text x="635" y="358" text-anchor="middle" fill="#1f2937" font-size="38" font-weight="800">30%</text><text x="635" y="390" text-anchor="middle" fill="#1f2937" font-size="20" font-weight="700">WANTS</text><text x="860" y="358" text-anchor="middle" fill="#fff" font-size="34" font-weight="800">20%</text><text x="860" y="390" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">SAVE</text><circle cx="74" cy="500" r="16" fill="#4f46e5"/><text x="110" y="498" fill="#1f2937" font-size="30" font-weight="800">50% — Needs</text><text x="110" y="538" fill="#6b7280" font-size="24">Housing, groceries, utilities, insurance, minimum debt payments</text><circle cx="74" cy="650" r="16" fill="#a5b4fc"/><text x="110" y="648" fill="#1f2937" font-size="30" font-weight="800">30% — Wants</text><text x="110" y="688" fill="#6b7280" font-size="24">Dining out, entertainment, travel, subscriptions, hobbies</text><circle cx="74" cy="800" r="16" fill="#16a34a"/><text x="110" y="798" fill="#1f2937" font-size="30" font-weight="800">20% — Savings</text><text x="110" y="838" fill="#6b7280" font-size="24">Emergency fund, retirement, investing, extra debt payoff</text><rect x="50" y="1300" width="900" height="92" rx="14" fill="#eef0ff"/><rect x="50" y="1300" width="6" height="92" rx="3" fill="#4f46e5"/><text x="78" y="1338" fill="#4f46e5" font-size="22" font-weight="800">EXAMPLE</text><text x="78" y="1372" fill="#1f2937" font-size="24" font-weight="600">$5,000/mo take-home  →  $2,500 needs · $1,500 wants · $1,000 saved</text><rect y="1460" width="1000" height="40" fill="#f3f4f6"/><text x="50" y="1487" fill="#4f46e5" font-size="24" font-weight="800">usecalcfi.com</text><text x="950" y="1487" text-anchor="end" fill="#6b7280" font-size="20">Free to share with credit</text></svg>