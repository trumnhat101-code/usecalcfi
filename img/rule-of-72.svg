<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" width="1000" height="1500" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif"><defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect width="1000" height="1500" fill="#ffffff"/><rect width="1000" height="240" fill="url(#hg)"/><text x="50" y="100" fill="#ffffff" font-size="54" font-weight="800">The Rule of 72</text><text x="50" y="152" fill="#e9e7fb" font-size="25" font-weight="600">How fast will your money double?</text><text x="50" y="208" fill="#ffffff" font-size="23" font-weight="700" opacity="0.95">A quick mental-math shortcut for investing</text><rect x="50" y="300" width="900" height="150" rx="16" fill="#eef0ff"/><text x="500" y="378" text-anchor="middle" fill="#4f46e5" font-size="46" font-weight="800">72  ÷  rate (%)</text><text x="500" y="424" text-anchor="middle" fill="#1f2937" font-size="26" font-weight="600">= years to double your money</text><text x="50" y="574" fill="#1f2937" font-size="34" font-weight="800">4%</text><rect x="160" y="546" width="168" height="40" rx="8" fill="#a5b4fc"/><text x="344" y="576" fill="#4f46e5" font-size="28" font-weight="800">18 years</text><text x="50" y="666" fill="#1f2937" font-size="34" font-weight="800">6%</text><rect x="160" y="638" width="252" height="40" rx="8" fill="#a5b4fc"/><text x="428" y="668" fill="#4f46e5" font-size="28" font-weight="800">12 years</text><text x="50" y="758" fill="#1f2937" font-size="34" font-weight="800">8%</text><rect x="160" y="730" width="336" height="40" rx="8" fill="#a5b4fc"/><text x="512" y="760" fill="#4f46e5" font-size="28" font-weight="800">9 years</text><text x="50" y="850" fill="#1f2937" font-size="34" font-weight="800">10%</text><rect x="160" y="822" width="436" height="40" rx="8" fill="#a5b4fc"/><text x="612" y="852" fill="#4f46e5" font-size="28" font-weight="800">7.2 years</text><text x="50" y="942" fill="#1f2937" font-size="34" font-weight="800">12%</text><rect x="160" y="914" width="515" height="40" rx="8" fill="#a5b4fc"/><text x="691" y="944" fill="#4f46e5" font-size="28" font-weight="800">6 years</text><text x="50" y="1080" fill="#6b7280" font-size="24">Higher returns double your money far faster — the power of compounding.</text><rect x="50" y="1300" width="900" height="92" rx="14" fill="#eef0ff"/><rect x="50" y="1300" width="6" height="92" rx="3" fill="#4f46e5"/><text x="78" y="1338" fill="#4f46e5" font-size="22" font-weight="800">EXAMPLE</text><text x="78" y="1372" fill="#1f2937" font-size="24" font-weight="600">At 8% return, $10,000 becomes ~$20,000 in about 9 years.</text><rect y="1460" width="1000" height="40" fill="#f3f4f6"/><text x="50" y="1487" fill="#4f46e5" font-size="24" font-weight="800">usecalcfi.com</text><text x="950" y="1487" text-anchor="end" fill="#6b7280" font-size="20">Free to share with credit</text></svg>