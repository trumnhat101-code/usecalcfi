<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" width="1000" height="1500" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif"><defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/></linearGradient></defs><rect width="1000" height="1500" fill="#ffffff"/><rect width="1000" height="240" fill="url(#hg)"/><text x="50" y="100" fill="#ffffff" font-size="54" font-weight="800">Emergency Fund Rule</text><text x="50" y="152" fill="#e9e7fb" font-size="25" font-weight="600">How much should you save?</text><text x="50" y="208" fill="#ffffff" font-size="23" font-weight="700" opacity="0.95">Your financial safety net</text><text x="500" y="430" text-anchor="middle" fill="#4f46e5" font-size="120" font-weight="800">3–6</text><text x="500" y="500" text-anchor="middle" fill="#1f2937" font-size="34" font-weight="700">months of essential expenses</text><rect x="50" y="580" width="900" height="20" rx="10" fill="#e5e7eb"/><rect x="50" y="580" width="900" height="20" rx="10" fill="#a5b4fc"/><circle cx="180" cy="590" r="22" fill="#4f46e5"/><circle cx="820" cy="590" r="22" fill="#16a34a"/><text x="180" y="660" text-anchor="middle" fill="#1f2937" font-size="30" font-weight="800">3 months</text><text x="820" y="660" text-anchor="middle" fill="#1f2937" font-size="30" font-weight="800">6+ months</text><text x="50" y="760" fill="#1f2937" font-size="26" font-weight="800">Lean toward 3 months if…</text><text x="50" y="800" fill="#6b7280" font-size="24">Stable job · dual income · no dependents</text><text x="50" y="880" fill="#1f2937" font-size="26" font-weight="800">Lean toward 6+ months if…</text><text x="50" y="920" fill="#6b7280" font-size="24">Single earner · self-employed · variable income · dependents</text><text x="50" y="1030" fill="#6b7280" font-size="24">Keep it in a high-yield savings account for quick access.</text><rect x="50" y="1300" width="900" height="92" rx="14" fill="#eef0ff"/><rect x="50" y="1300" width="6" height="92" rx="3" fill="#4f46e5"/><text x="78" y="1338" fill="#4f46e5" font-size="22" font-weight="800">EXAMPLE</text><text x="78" y="1372" fill="#1f2937" font-size="24" font-weight="600">Spend $4,000/month?  →  aim for $12,000–$24,000 saved.</text><rect y="1460" width="1000" height="40" fill="#f3f4f6"/><text x="50" y="1487" fill="#4f46e5" font-size="24" font-weight="800">usecalcfi.com</text><text x="950" y="1487" text-anchor="end" fill="#6b7280" font-size="20">Free to share with credit</text></svg>