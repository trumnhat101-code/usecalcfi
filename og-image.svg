<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2ff"/>
      <stop offset="100%" style="stop-color:#f7f8fc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect width="8" height="630" fill="#4f46e5"/>

  <!-- Logo area -->
  <text x="80" y="220" font-size="72" font-family="Arial,sans-serif">💰</text>
  <text x="168" y="218" font-size="64" font-weight="800" font-family="-apple-system,Arial,sans-serif" fill="#4f46e5">UseCalcFi</text>

  <!-- Headline -->
  <text x="80" y="310" font-size="52" font-weight="800" font-family="-apple-system,Arial,sans-serif" fill="#1f2937">Free Financial Calculators</text>
  <text x="80" y="376" font-size="52" font-weight="800" font-family="-apple-system,Arial,sans-serif" fill="#1f2937">for Every Money Decision</text>

  <!-- Subtext -->
  <text x="80" y="440" font-size="30" font-family="-apple-system,Arial,sans-serif" fill="#6b7280">Mortgage · Auto Loan · Taxes · Retirement · Debt Payoff</text>

  <!-- Tags -->
  <rect x="80" y="490" width="200" height="48" rx="24" fill="#eef0ff"/>
  <text x="180" y="521" font-size="22" text-anchor="middle" font-family="Arial,sans-serif" fill="#4f46e5" font-weight="600">18 Free Tools</text>

  <rect x="296" y="490" width="200" height="48" rx="24" fill="#eef0ff"/>
  <text x="396" y="521" font-size="22" text-anchor="middle" font-family="Arial,sans-serif" fill="#4f46e5" font-weight="600">No Sign-up</text>

  <rect x="512" y="490" width="230" height="48" rx="24" fill="#eef0ff"/>
  <text x="627" y="521" font-size="22" text-anchor="middle" font-family="Arial,sans-serif" fill="#4f46e5" font-weight="600">100% Private</text>

  <!-- Right decoration -->
  <text x="950" y="350" font-size="180" font-family="Arial,sans-serif" opacity="0.08">$</text>
</svg>
